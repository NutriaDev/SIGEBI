server:
  port: 8087

spring:
  application:
    name: ms-reportsandaudit

  cloud:
    config:
      enabled: false

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sigebi-report-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "sigebi.reportsandaudit.kafka,sigebi.maintenance.kafka,inventory.kafka"
        spring.json.type.mapping: "sigebi.maintenance.kafka.ReportEvent:sigebi.reportsandaudit.kafka.ReportEvent,inventory.kafka.MovementEvent:sigebi.reportsandaudit.kafka.MovementEvent,inventory.kafka.InventoryEvent:sigebi.reportsandaudit.kafka.InventoryEvent"

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

feign:
  httpclient:
    enabled: true

kafka:
  topics:
    audit-events: sigebi-audit-events
    report-events: sigebi-report-events
    movement-events: sigebi-movement-events    # ← nuevo
    inventory-events: sigebi-inventory-events

equipment-service:
  url: http://localhost:8091

user-service:
  url: http://localhost:8090