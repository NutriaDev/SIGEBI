server:
  port: 8091
spring:
  cloud:
    config:
      enabled: false
  application:
    name: ms-equipments

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update                #borra tablas en cada inicio
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true  #data.sql después del schema

  sql:
    init:
      mode: never #Ejecuta data.sql SIEMPRE

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 10
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topics:
    equipment-events: sigebi-equipment-events

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka