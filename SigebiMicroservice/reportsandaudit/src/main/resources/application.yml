server:
  port: 8087

spring:
  application:
    name: ms-reportsandaudit

  cloud:
    config:
      enabled: false

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# 🔥 CONFIGURACIÓN FEIGN
feign:
  httpclient:
    enabled: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    group-id: sigebi-audit-group
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring.json.trusted.packages: sigebi.reportsandaudit.kafka.*
      spring.json.value.default.type: java.lang.Object
  topics:
    audit-events: sigebi-audit-events
    report-events: sigebi-report-events

equipment-service:
  url: http://localhost:8091

user-service:
  url: http://localhost:8090
