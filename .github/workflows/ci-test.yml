name: CI - Tests (Selected Microservices)

on:
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, ready_for_review ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - users

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
      SPRING_DATASOURCE_USERNAME: test_user
      SPRING_DATASOURCE_PASSWORD: test_pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Check for sensitive prints
        run: |
          if grep -rE "System\.out\.println|print\(|password=|secret=|token=|clave=" SigebiMicroservice/${{ matrix.service }}/src; then
            echo "Sensitive or debug prints found. Failing build."
            exit 1
          fi

      - name: Run tests with coverage check
        run: mvn -f SigebiMicroservice/pom.xml -pl ${{ matrix.service }} -am clean verify